name: Bug report
description: Report reproducible application or tooling behavior that is not a security vulnerability.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Security vulnerabilities must be reported privately through the repository security policy.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I confirmed this is not an intentionally vulnerable challenge behavior.
          required: true
        - label: I confirmed this is not a security vulnerability requiring private disclosure.
          required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps, request, or test case.
      placeholder: |
        1. Start the app with ...
        2. Visit ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: revision
    attributes:
      label: Revision
      description: Commit SHA, branch, or release where you observed the problem.
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Environment
      options:
        - Local Node.js
        - Docker Compose
        - Railway
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, tokens, email addresses, and player data before pasting logs.
      render: shell
